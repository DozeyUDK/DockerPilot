python: |
  FROM python:3.12-slim
  WORKDIR /app

  COPY requirements*.txt ./
  RUN if [ -f requirements.txt ]; then pip install --no-cache-dir -r requirements.txt; fi

  COPY . .

  CMD ["python", "app.py"]

node: |
  FROM node:22-alpine
  WORKDIR /app

  COPY package*.json ./
  RUN if [ -f package.json ]; then npm install; fi

  COPY . .

  CMD ["npm", "start"]

nginx: |
  FROM nginx:alpine

  COPY . /usr/share/nginx/html

alpine: |
  FROM alpine:latest
  WORKDIR /app

  COPY . .

  CMD ["sh"]
